tunnel: %%CF_TUNNEL_ID%%
credentials-file: /etc/cloudflared/%%CF_TUNNEL_ID%%.json

ingress:
  - hostname: %%MEDIA_DOMAIN%%
    service: http://127.0.0.1:3902      # Garage web endpoint (public media reads)

  - hostname: %%SOCIAL_DOMAIN%%
    service: http://127.0.0.1:80        # nginx; nginx routes /api/v1/streaming -> :4000 itself

  - service: http_status:404
