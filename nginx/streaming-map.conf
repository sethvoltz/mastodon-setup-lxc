# Included from http {} via conf.d — maps for Mastodon nginx vhost.

map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

# Loopback health checks and cloudflared have no CF-Connecting-IP; fall back to $remote_addr.
map $http_cf_connecting_ip $mastodon_client_ip {
  ''      $remote_addr;
  default $http_cf_connecting_ip;
}
